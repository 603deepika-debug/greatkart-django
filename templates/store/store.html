<section class="section-content padding-y" style="min-height:130vh; margin-top:150px;">
<div class="container">

    <!-- 🔥 TOP FILTER BAR -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">

        <h4>Our Store</h4>

        <div>
            <select class="form-select d-inline w-auto">
                <option>Sort by</option>
                <option>Price low to high</option>
                <option>Price high to low</option>
            </select>
        </div>

    </div>

    <!-- 🔥 CATEGORY CHIPS (SCROLLABLE) -->
    <div class="mb-4 category-scroll">
<!--        <button class="chip active">All</button>-->
        <a href="{% url 'store' %}" class="chip active">All Products</a>
        {% for category in links %}
<!--        <button class="chip"><a href="chip {{category.get_url}}">{{category.category_name}}</a></button>-->
        <a href="{{category.get_url}}" class="chip">{{category.category_name}}</a>
        {% endfor %}
<!--        <button class="chip">Clothes</button>-->
<!--        <button class="chip">Shoes</button>-->
<!--        <button class="chip">Watches</button>-->
<!--        <button class="chip">Accessories</button>-->
    </div>

    <div class="border-bottom mb-4 pb-3">
        <div class="form-inline">
            <span class="mr-md-auto"><b>{{product_count}}</b> items found</span>
        </div>
    </div>
    <!-- 🔥 PRODUCT GRID -->
    <div class="row">
        {% for product in products %}
        <div class="col-md-3 col-sm-6 mb-4">
            <div class="product-card">

                <div class="img-box">
                    <a href="{{product.get_url}}">
                        <img src="{{ product.images.url }}">
                    </a>

                </div>

                <div class="p-3 text-center">
                    <h6>
                        <a href="{{product.get_url}}" style="text-decoration:none; color:black;">{{ product.product_name }}</a>
                    </h6>
                    <p class="price">₹{{ product.price }}</p>

                    <button class="btn btn-dark btn-sm">Add to Cart</button>
                </div>

            </div>
        </div>
        {% endfor %}
    </div>

</div>
</section>
{% endblock %}
