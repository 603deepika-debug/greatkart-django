        /* 🔥 Category Chips */
        .category-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
        }

        .chip {
            border: 1px solid #ddd;
            padding: 8px 15px;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .chip:hover,
        .chip.active {
            background: black;
            color: white;
        }

        /* 🔥 Product Card */
        .product-card {
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
            background: #fff;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.08);
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
        }

        /* 🔥 Image */
        .img-box {
            height: 230px;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }

        .product-card:hover img {
            transform: scale(1.05);
        }

        /* 🔥 Price */
        .price {
            font-weight: bold;
            color: #007bff;
        }
       .product-detail-section{

       .product-image{

       .img-wrap{
